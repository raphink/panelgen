name: checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "Unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...
