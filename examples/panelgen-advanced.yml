style: style.txt

defaults:
  size: 1024x1024
  quality: high

output_dir: generated

characters:
  explorer:
    prompt: "Clockwork fox explorer in white spacesuit"
    refs:
      - refs/clockwork-fox.png   # concept art; replaced by generated images once available

  sidekick:
    prompt: "Small helper robot with a single blue lens"
    refs:
      - refs/robot-sidekick.png

scenes:
  bridge:
    description: "Inside a spacecraft bridge"
    prompt_prefix: >
      Comic panel aboard a spacecraft bridge, {framing}, clear
      silhouettes, consistent visual identity.
    vars:
      framing: "medium shot"   # default; panels can override
    characters:
      - explorer
    size: 1024x1024

panels:
  - page: 1
    scene: bridge
    vars:
      framing: "wide establishing shot"
    prompt: >
      Explorer at the command console, focused and calm.

  - page: 2
    scene: bridge
    continue: 1   # use the best generated image for page 1 as a reference
    prompt: >
      Explorer in the same position moments later, alarm lights now active.
      Keep pose and framing consistent with previous panel.

  - page: 3
    scene: bridge
    continue: 2
    characters:
      - sidekick   # sidekick not in the scene by default; added here for this panel only
    prompt: >
      Same bridge scene, sidekick robot enters frame in the foreground.
      Keep explorer design consistent with previous panel.
