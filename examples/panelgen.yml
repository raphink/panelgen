style: style.txt

defaults:
  size: 1024x1024
  quality: medium

output_dir: generated

characters:
  explorer:
    prompt: "Clockwork fox character in a white spacesuit and clear helmet"
    refs:
      - refs/clockwork-fox.png

scenes:
  space-solo:
    prompt: "Single character in open space"
    prompt_prefix: >
      Comic panel in outer space with strong contrast, readable subject,
      and clean composition suitable for a story sequence.
    characters:
      - explorer
    size: 1024x1024
    quality: high

panels:
  - page: 1
    scene: space-solo
    prompt: >
      The clockwork fox floats near a terminal screen displaying a green
      check mark. Confident pose, medium shot.

  - page: 2
    scene: space-solo
    prompt: >
      The clockwork fox reacts to a sudden explosion in the distance.
      Wide shot, dramatic lighting, no text bubbles.
