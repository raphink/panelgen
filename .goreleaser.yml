version: 2

project_name: panelgen

before:
  hooks:
    - go test ./...

builds:
  - id: panelgen
    main: .
    binary: panelgen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: archives
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: panelgen
    repository:
      owner: raphink
      name: homebrew-panelgen
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/raphink/panelgen"
    description: "AI image series generator for comics and carousels"
    license: "MIT"
    install: |
      bin.install "panelgen"
    test: |
      system "#{bin}/panelgen", "version"

release:
  draft: false
  prerelease: auto
